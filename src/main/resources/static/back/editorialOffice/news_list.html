<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻列表</title>
    <!-- 简单引入Bootstrap样式用于表格美观 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .stat-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #0d6efd;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background-color: #f8f9fa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .badge-news {
            background-color: #6c757d;
            color: white;
        }
        .badge-notice {
            background-color: #fd7e14;
            color: white;
        }
        .badge-published {
            background-color: #198754;
            color: white;
        }
        .badge-draft {
            background-color: #6c757d;
            color: white;
        }
        .badge-scheduled {
            background-color: #0dcaf0;
            color: white;
        }
        .pagination {
            margin-top: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <a href="/front/" style="position:fixed;right:24px;bottom:24px;z-index:1200;display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border-radius:999px;background:#1f4f99;color:#fff;text-decoration:none;box-shadow:0 12px 24px rgba(31,79,153,.22);">
        前台首页
    </a>
    <div class="container">
        <h1>📰 新闻公告列表</h1>
        
        <!-- 统计信息 -->
        <div class="row" id="statistics">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalNews">0</div>
                    <div class="stat-label">新闻总数</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="publishedNews">0</div>
                    <div class="stat-label">已发布</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="draftNews">0</div>
                    <div class="stat-label">草稿</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="scheduledNews">0</div>
                    <div class="stat-label">定时发布</div>
                </div>
            </div>
        </div>
        
        <!-- 筛选选项 -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label>新闻类型：</label>
                <select id="filterType" class="form-select form-select-sm">
                    <option value="">全部类型</option>
                    <option value="REGULAR_NEWS">普通新闻</option>
                    <option value="CALL_FOR_PAPERS">征稿通知</option>
                    <option value="SPECIAL_ISSUE">特刊公告</option>
                </select>
            </div>
            <div class="col-md-3">
                <label>发布状态：</label>
                <select id="filterStatus" class="form-select form-select-sm">
                    <option value="">全部状态</option>
                    <option value="Published">已发布</option>
                    <option value="Draft">草稿</option>
                    <option value="Scheduled">定时发布</option>
                </select>
            </div>
            <div class="col-md-3">
                <label>是否公告：</label>
                <select id="filterNotice" class="form-select form-select-sm">
                    <option value="">全部</option>
                    <option value="0">普通新闻</option>
                    <option value="1">期刊公告</option>
                </select>
            </div>
            <div class="col-md-3">
                <label>&nbsp;</label>
                <button class="btn btn-primary btn-sm w-100" onclick="loadNewsList(1)">搜索</button>
            </div>
        </div>
        
        <!-- 新闻表格 -->
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>类型</th>
                        <th>公告</th>
                        <th>状态</th>
                        <th>发布日期</th>
                        <th>发布人</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="newsTableBody">
                    <!-- 数据动态加载 -->
                </tbody>
            </table>
        </div>
        
        <!-- 空状态 -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <i>📰</i>
            <h3>暂无新闻数据</h3>
            <p>还没有发布任何新闻或公告</p>
        </div>
        
        <!-- 加载状态 -->
        <div id="loadingState" class="loading">
            正在加载新闻数据...
        </div>
        
        <!-- 分页 -->
        <nav id="pagination">
            <ul class="pagination justify-content-center">
                <!-- 分页按钮动态生成 -->
            </ul>
        </nav>
    </div>
    
    <!-- 详情模态框 -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row mb-3">
                        <div class="col-md-3"><strong>类型：</strong><span id="detailType"></span></div>
                        <div class="col-md-3"><strong>状态：</strong><span id="detailStatus"></span></div>
                        <div class="col-md-3"><strong>公告：</strong><span id="detailNotice"></span></div>
                        <div class="col-md-3"><strong>日期：</strong><span id="detailDate"></span></div>
                    </div>
                    <div id="detailAttachment" class="mb-3"></div>
                    <hr>
                    <div id="detailContent"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 引入jQuery和Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 配置
        const apiBaseUrl = '/editorial-office/news';
        const pageSize = 10;
        let currentPage = 1;
        let totalItems = 0;
        
        // 页面加载完成时执行
        $(document).ready(function() {
            loadStatistics();
            loadNewsList(1);
        });
        
        // 加载统计数据
        function loadStatistics() {
            $.ajax({
                url: apiBaseUrl + '/stats',
                type: 'GET',
                success: function(response) {
                    if (response.code === 200) {
                        $('#totalNews').text(response.data.total || 0);
                        $('#publishedNews').text(response.data.published || 0);
                        $('#draftNews').text(response.data.draft || 0);
                        $('#scheduledNews').text(response.data.scheduled || 0);
                    }
                }
            });
        }
        
        // 加载新闻列表
        function loadNewsList(page) {
            currentPage = page;
            
            // 显示加载状态
            $('#loadingState').show();
            $('#emptyState').hide();
            $('#newsTableBody').empty();
            
            // 构建查询参数
            const params = {
                page: page,
                pageSize: pageSize
            };
            
            // 添加筛选条件
            const type = $('#filterType').val();
            const status = $('#filterStatus').val();
            const notice = $('#filterNotice').val();
            
            if (type) params.type = type;
            if (status) params.status = status;
            if (notice) params.notice = notice;
            
            $.ajax({
                url: apiBaseUrl + '/list',
                type: 'GET',
                data: params,
                success: function(response) {
                    $('#loadingState').hide();
                    
                    if (response.code === 200 && response.data.data && response.data.data.length > 0) {
                        renderNewsList(response.data.data);
                        updatePagination(response.data.total);
                    } else {
                        $('#emptyState').show();
                        renderPagination(0);
                    }
                },
                error: function() {
                    $('#loadingState').hide();
                    $('#emptyState').show();
                    $('#emptyState h3').text('加载失败');
                    $('#emptyState p').text('请检查网络连接或联系管理员');
                }
            });
        }
        
        // 渲染新闻列表
        function renderNewsList(data) {
            const tbody = $('#newsTableBody');
            tbody.empty();
            
            data.forEach(function(item) {
                const row = createNewsRow(item);
                tbody.append(row);
            });
        }
        
        // 创建新闻行
        function createNewsRow(item) {
            // 格式化日期
            const publishDate = formatDate(item.publishDate || item.publish_date);
            
            // 获取状态标签
            const statusBadge = getStatusBadge(item.publishStatus || item.publish_status);
            const typeBadge = getTypeBadge(item.newsType || item.news_type);
            const noticeBadge = getNoticeBadge(item.isNotice || item.is_notice);
            
            // 内容预览（去除HTML标签）
            let contentPreview = item.content || '';
            contentPreview = contentPreview.replace(/<[^>]*>/g, '');
            if (contentPreview.length > 100) {
                contentPreview = contentPreview.substring(0, 100) + '...';
            }
            
            return `
                <tr>
                    <td>${item.id}</td>
                    <td>
                        <strong>${item.title}</strong>
                        <div class="text-muted small">${contentPreview}</div>
                    </td>
                    <td>${typeBadge}</td>
                    <td>${noticeBadge}</td>
                    <td>${statusBadge}</td>
                    <td>${publishDate}</td>
                    <td>编辑${item.publisherId || item.publisher_id}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="showDetail(${item.id})">查看</button>
                        <button class="btn btn-sm btn-warning" onclick="editNews(${item.id})">编辑</button>
                    </td>
                </tr>
            `;
        }
        
        // 显示新闻详情
        function showDetail(id) {
            $.ajax({
                url: apiBaseUrl + '/detail/' + id,
                type: 'GET',
                success: function(response) {
                    if (response.code === 200) {
                        const news = response.data;
                        $('#detailTitle').text(news.title);
                        
                        // 设置详情信息
                        $('#detailType').text(getTypeText(news.newsType));
                        $('#detailStatus').text(getStatusText(news.publishStatus));
                        $('#detailNotice').text(news.isNotice == 1 ? '是' : '否');
                        $('#detailDate').text(formatDate(news.publishDate));
                        
                        // 显示附件
                        if (news.attachmentPath) {
                            const fileName = news.attachmentPath.split('/').pop();
                            $('#detailAttachment').html(`
                                <strong>附件：</strong>
                                <a href="#" onclick="downloadFile('${news.attachmentPath}')">${fileName}</a>
                            `);
                        } else {
                            $('#detailAttachment').html('<strong>附件：</strong>无');
                        }
                        
                        // 显示内容
                        $('#detailContent').html(news.content || '无内容');
                        
                        // 显示模态框
                        const modal = new bootstrap.Modal(document.getElementById('detailModal'));
                        modal.show();
                    }
                }
            });
        }
        
        // 编辑新闻（跳转到编辑页面）
        function editNews(id) {
            // 这里可以跳转到现有的新闻管理页面
            window.location.href = 'news_manage.html?edit=' + id;
        }
        
        // 下载文件
        function downloadFile(path) {
            // 这里应该实现文件下载逻辑
            alert('文件下载功能: ' + path);
        }
        
        // 更新分页
        function updatePagination(total) {
            totalItems = total;
            renderPagination(total);
        }
        
        // 渲染分页
        function renderPagination(total) {
            const totalPages = Math.ceil(total / pageSize);
            const pagination = $('.pagination');
            pagination.empty();
            
            if (totalPages <= 1) return;
            
            // 上一页
            const prevDisabled = currentPage === 1 ? 'disabled' : '';
            pagination.append(`
                <li class="page-item ${prevDisabled}">
                    <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">上一页</a>
                </li>
            `);
            
            // 页码
            for (let i = 1; i <= totalPages; i++) {
                const active = i === currentPage ? 'active' : '';
                pagination.append(`
                    <li class="page-item ${active}">
                        <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
                    </li>
                `);
            }
            
            // 下一页
            const nextDisabled = currentPage === totalPages ? 'disabled' : '';
            pagination.append(`
                <li class="page-item ${nextDisabled}">
                    <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">下一页</a>
                </li>
            `);
        }
        
        // 切换页面
        function changePage(page) {
            loadNewsList(page);
        }
        
        // 辅助函数：格式化日期
        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('zh-CN');
            } catch (e) {
                return dateString;
            }
        }
        
        // 辅助函数：获取状态标签
        function getStatusBadge(status) {
            const badges = {
                'Published': {class: 'badge-published', text: '已发布'},
                'Draft': {class: 'badge-draft', text: '草稿'},
                'Scheduled': {class: 'badge-scheduled', text: '定时'}
            };
            const badge = badges[status] || {class: 'badge-draft', text: status};
            return `<span class="badge ${badge.class}">${badge.text}</span>`;
        }
        
        // 辅助函数：获取类型标签
        function getTypeBadge(type) {
            const types = {
                'REGULAR_NEWS': '普通新闻',
                'CALL_FOR_PAPERS': '征稿通知',
                'SPECIAL_ISSUE': '特刊公告'
            };
            return types[type] || type;
        }
        
        // 辅助函数：获取公告标签
        function getNoticeBadge(isNotice) {
            return isNotice == 1 ? 
                '<span class="badge badge-notice">公告</span>' : 
                '<span class="badge badge-news">新闻</span>';
        }
        
        // 辅助函数：获取状态文本
        function getStatusText(status) {
            const texts = {
                'Published': '已发布',
                'Draft': '草稿',
                'Scheduled': '定时发布'
            };
            return texts[status] || status;
        }
        
        // 辅助函数：获取类型文本
        function getTypeText(type) {
            const texts = {
                'REGULAR_NEWS': '普通新闻',
                'CALL_FOR_PAPERS': '征稿通知',
                'SPECIAL_ISSUE': '特刊公告'
            };
            return texts[type] || type;
        }
    </script>
</body>
</html>
